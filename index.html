<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edwoods Timber Wears</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial,sans-serif; background:#0a0a0a; color:#fff;}
header { text-align:center; padding:70px 15px 20px;}
header img { max-width:500px; width:90%;}
.tagline { margin-top:10px; color:#c9a15b; letter-spacing:2px; font-size:13px;}

.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; padding:15px; max-width:1200px; margin:auto;}
.gallery img { width:100%; height:240px; object-fit:cover; border-radius:12px; transition:transform .3s ease;}
.gallery img:hover { transform:scale(1.04);}

.map-section { padding:30px 15px; text-align:center;}
.map-section iframe {
  width:100%;
  max-width:900px;
  height:300px;
  border:0;
  border-radius:12px;
  filter: grayscale(100%) invert(95%) brightness(80%) contrast(110%);
}

footer { text-align:center; padding:40px 15px; border-top:1px solid #222;}
.contact { color:#ccc; margin-bottom:20px; font-size:14px;}

.social a { display:inline-block; margin:0 14px;}
.social svg { width:38px; height:38px; fill:#c9a15b; transition:.2s;}
.social svg:hover { transform:scale(1.2); opacity:.8;}

@media (min-width:700px){
  .gallery img { height:300px;}
}
</style>
</head>
