<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edwoods Timber Wears</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial,sans-serif; background:#0a0a0a; color:#fff;}

header { text-align:center; padding:50px 10px 10px;}
header img { max-width:650px; width:95%;}
@media (max-width:600px){
  header img { width:100%; max-width:none; }
}

.tagline { margin-top:10px; color:#c9a15b; letter-spacing:2px; font-size:13px;}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
  max-width:1100px;
  margin:auto;
}

.gallery img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  transition:transform .3s ease;
}

.gallery img:hover { transform:scale(1.04);}

.map-section { padding:25px 10px; text-align:center;}
.map-section iframe {
  width:100%;
  max-width:900px;
  height:260px;
  border:0;
  border-radius:12px;
  filter: grayscale(100%) invert(95%) brightness(80%) contrast(110%);
}

footer { text-align:center; padding:35px 10px; border-top:1px solid #222;}
.contact { color:#ccc; margin-bottom:20px; font-size:14px;}

.social a { display:inline-block; margin:0 14px;}
.social svg { width:40px; height:40px; fill:#c9a15b; transition:.2s;}
.social svg:hover { transform:scale(1.2); opacity:.8;}
</style>
</head>

<body>

<header>
  <img src="logo.jpg">
  <div class="tagline">HANDCRAFTED IN TASMANIA</div>
</header>

<section class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
  <img src="img4.jpg">
  <img src="img5.jpg">
  <img src="img6.jpg">
  <img src="img7.jpg">
  <img src="img8.jpg">
  <img src="img9.jpg">
  <img src="img10.jpg">
  <img src="img11.jpg">
  <img src="img12.jpg">
  <img src="img13.jpg">
  <img src="img14.jpg">
  <img src="img15.jpg">
  <img src="img16.jpg">
</section>

<div class="map-section">
  <h3 style="color:#c9a15b;">Find us at Salamanca Market — Site 272</h3>
  <iframe src="https://www.google.com/maps?q=Salamanca+Market+Hobart&output=embed"></iframe>
</div>

<footer>
  <div class="contact">
    <p>Email: edwoodsbrand@gmail.com</p>
    <p>Phone: 0413 763 100</p>
  </div>

  <p style="color:#aaa;">Follow our work</p>

  <div class="social">
    <!-- Facebook -->
    <a href="https://www.facebook.com/EDWOODS" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.7-1.6 1.5V12H17l-.5 3h-2.7v7A10 10 0 0 0 22 12z"/></svg>
    </a>

    <!-- Instagram -->
    <a href="https://www.instagram.com/edwoodsbrand" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm6.5-.8a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
    </a>
  </div>
</footer>

</body>
</html>
